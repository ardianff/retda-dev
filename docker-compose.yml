version: "3.8"

services:
  myretda-dev-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myretda-dev
    restart: always
    working_dir: /var/www/html
    volumes:
      - /var/projects/web/retda-dev:/var/www/html
      # kalau folder project sudah di-mount, baris storage biasanya tak perlu lagi:
      # - /var/projects/web/apotek/storage:/var/www/html/storage
      - backup_data:/var/www/html/backup
    ports:
      - "4109:80"
    environment:
      # koneksi default -> mysql5 
      DB_CONNECTION: mysql
      DB_HOST: mysql5 
      DB_PORT: 3306
      DB_DATABASE: db_myretda 
      DB_USERNAME: nuha
      DB_PASSWORD: "Majeng05@!#"

    

      APP_TIMEZONE: Asia/Jakarta
    networks:
      - db_net
    # catatan: depends_on tidak berguna untuk service di compose lain,
    # jadi pastikan stack DB sudah running dulu.

networks:
  db_net:
    external: true

volumes:
  backup_data:
    
